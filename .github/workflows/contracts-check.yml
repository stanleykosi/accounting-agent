# Purpose: Enforce that the generated TypeScript SDK stays in sync with the FastAPI OpenAPI schema.
# Scope: CI workflow for pull requests and mainline updates that regenerate the SDK and fail on drift.
# Dependencies: pnpm workspace install, uv-managed Python environment, and infra/scripts/generate-ts-sdk.sh.

name: Contracts Check

on:
  pull_request:
    paths:
      - ".github/workflows/contracts-check.yml"
      - "apps/api/**"
      - "infra/scripts/generate-ts-sdk.sh"
      - "package.json"
      - "packages/ts-sdk/**"
      - "pnpm-lock.yaml"
      - "pyproject.toml"
      - "services/contracts/**"
      - "services/common/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/contracts-check.yml"
      - "apps/api/**"
      - "infra/scripts/generate-ts-sdk.sh"
      - "package.json"
      - "packages/ts-sdk/**"
      - "pnpm-lock.yaml"
      - "pyproject.toml"
      - "services/contracts/**"
      - "services/common/**"

jobs:
  contracts-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.8.17"

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Install Node.js dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate TypeScript SDK
        run: pnpm run contracts:generate

      - name: Verify no contract drift
        run: git diff --exit-code -- packages/ts-sdk/src/generated/openapi.ts
