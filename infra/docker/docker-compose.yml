# Purpose: Define the canonical local demo runtime stack for the Accounting AI Agent.
# Scope: PostgreSQL with pgvector, Redis, MinIO, MinIO bucket initialization, OpenTelemetry collector, API, and worker services.
# Dependencies: Dockerfiles and init assets under infra/docker, the OTEL collector config under infra/otel, and backend settings declared in .env.example.

x-backend-environment: &backend-environment
  runtime_environment: ${runtime_environment:-development}
  runtime_debug: ${runtime_debug:-false}
  runtime_timezone_name: ${runtime_timezone_name:-Africa/Lagos}
  runtime_api_base_path: ${runtime_api_base_path:-/api}
  logging_level: ${logging_level:-INFO}
  logging_format: ${logging_format:-json}
  logging_include_stack_info: ${logging_include_stack_info:-false}
  api_host: 0.0.0.0
  api_port: ${api_port:-8000}
  api_reload: "false"
  api_request_timeout_seconds: ${api_request_timeout_seconds:-30}
  worker_concurrency: ${worker_concurrency:-2}
  worker_prefetch_multiplier: ${worker_prefetch_multiplier:-1}
  worker_max_tasks_per_child: ${worker_max_tasks_per_child:-100}
  worker_task_soft_time_limit_seconds: ${worker_task_soft_time_limit_seconds:-1500}
  worker_task_time_limit_seconds: ${worker_task_time_limit_seconds:-1800}
  worker_result_expires_seconds: ${worker_result_expires_seconds:-86400}
  worker_visibility_timeout_seconds: ${worker_visibility_timeout_seconds:-3600}
  database_host: postgres
  database_port: ${database_port:-5432}
  database_name: ${database_name:-accounting_agent}
  database_user: ${database_user:-accounting_agent}
  database_password: ${database_password:-accounting_agent}
  database_schema_name: ${database_schema_name:-public}
  database_echo_sql: ${database_echo_sql:-false}
  redis_broker_url: redis://redis:6379/0
  redis_result_backend_url: redis://redis:6379/1
  redis_cache_url: redis://redis:6379/2
  storage_endpoint: minio:9000
  storage_access_key: ${MINIO_ROOT_USER:-minioadmin}
  storage_secret_key: ${MINIO_ROOT_PASSWORD:-minioadmin}
  storage_secure: "false"
  storage_region: ${storage_region:-us-east-1}
  storage_document_bucket: ${storage_document_bucket:-close-run-documents}
  storage_artifact_bucket: ${storage_artifact_bucket:-close-run-artifacts}
  storage_derivative_bucket: ${storage_derivative_bucket:-close-run-derivatives}
  model_gateway_provider: ${model_gateway_provider:-openrouter}
  model_gateway_base_url: ${model_gateway_base_url:-https://openrouter.ai/api/v1}
  model_gateway_api_key: ${model_gateway_api_key:-}
  model_gateway_default_model: ${model_gateway_default_model:-openai/gpt-4.1-mini}
  model_gateway_timeout_seconds: ${model_gateway_timeout_seconds:-60}
  quickbooks_client_id: ${quickbooks_client_id:-}
  quickbooks_client_secret: ${quickbooks_client_secret:-}
  quickbooks_redirect_uri: ${quickbooks_redirect_uri:-http://127.0.0.1:8000/api/integrations/quickbooks/callback}
  quickbooks_sandbox_company_id: ${quickbooks_sandbox_company_id:-}
  quickbooks_use_sandbox: ${quickbooks_use_sandbox:-true}
  observability_enabled: ${observability_enabled:-true}
  observability_service_namespace: ${observability_service_namespace:-accounting-agent}
  observability_otlp_endpoint: http://otel-collector:4317
  observability_sample_ratio: ${observability_sample_ratio:-1.0}
  security_session_secret: ${security_session_secret:-change-me-before-demo-auth}
  security_token_signing_secret: ${security_token_signing_secret:-change-me-before-cli-auth}
  TZ: ${runtime_timezone_name:-Africa/Lagos}

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${database_name:-accounting_agent}
      POSTGRES_USER: ${database_user:-accounting_agent}
      POSTGRES_PASSWORD: ${database_password:-accounting_agent}
      TZ: ${runtime_timezone_name:-Africa/Lagos}
    ports:
      - "${database_port:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1000"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      TZ: ${runtime_timezone_name:-Africa/Lagos}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ENDPOINT_URL: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      storage_document_bucket: ${storage_document_bucket:-close-run-documents}
      storage_artifact_bucket: ${storage_artifact_bucket:-close-run-artifacts}
      storage_derivative_bucket: ${storage_derivative_bucket:-close-run-derivatives}
    entrypoint: ["/bin/sh", "/init/init.sh"]
    volumes:
      - ./minio/init.sh:/init/init.sh:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    volumes:
      - ../otel/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    environment:
      <<: *backend-environment
      runtime_service_name: accounting-ai-agent-api
    ports:
      - "${api_port:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    environment:
      <<: *backend-environment
      runtime_service_name: accounting-ai-agent-worker
    healthcheck:
      test: ["CMD", "python", "-m", "apps.worker.app.runtime", "--healthcheck"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  minio_data:
