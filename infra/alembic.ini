# Purpose: Define the canonical Alembic configuration path used by local operator scripts and future migration commands.
# Scope: Registers the migration script directory and Python import path for the repository-root execution model.
# Dependencies: `infra/alembic/env.py` and the migration versions created in later implementation steps.

[alembic]
script_location = infra/alembic
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
