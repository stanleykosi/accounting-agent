<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Accounting AI Agent - Initialize Workspace</title>
    <!-- Google Fonts: Inter & Newsreader -->

      tailwind.config = {

              secondary: "#45617b",
              "on-error": "#ffffff",
              "on-primary": "#ffffff",
              "on-secondary-fixed": "#001d32",
              "outline-variant": "#cfc4c5",
              "on-primary-container": "#848484",
              "surface-tint": "#5e5e5e",

              "on-tertiary-fixed": "#1b1b1b",
              "primary-fixed-dim": "#c6c6c6",
              "on-error-container": "#93000a",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              xs: "4px",
              xl: "40px",
              unit: "4px",
              sm: "8px",

              gutter: "16px",

            fontFamily: {

  <body
    class="bg-paper-surface min-h-screen flex items-center justify-center p-6 antialiased selection:bg-secondary-container selection:text-on-secondary-container"
  >
    <main
      class="w-full max-w-lg bg-surface-container-lowest border border-outline-variant rounded-DEFAULT flex flex-col relative overflow-hidden"
    >
      <!-- Subtle Top Border Accent -->
      <div class="h-1 w-full bg-primary absolute top-0 left-0"></div>
      <div class="p-8 sm:p-12 flex flex-col gap-10">
        <!-- Header Section -->
        <header class="flex flex-col gap-4">
          <div
            class="flex items-center justify-between w-full border-b border-outline-variant pb-4 mb-2"
          >
            <div class="flex items-center gap-2">
              <span
                class="font-headline-md text-headline-md font-extrabold tracking-tight text-primary"
                >AA</span
              >
              <span class="font-body-sm text-body-sm text-on-surface-variant font-medium"
                >Agent</span
              >
            </div>
            <span
              class="font-label-caps text-label-caps text-on-surface-variant tracking-widest uppercase"
              >Step 01 / 03</span
            >
          </div>
          <div class="flex flex-col gap-2">
            <h1 class="font-headline-lg text-headline-lg text-on-background">
              Initialize Your Workspace
            </h1>
            <p class="font-body-md text-body-md text-on-surface-variant">
              Define the core parameters for this entity's ledger. These settings establish the base
              structural data for your accounting close cycle.
            </p>
          </div>
        </header>
        <!-- Form Section -->
        <form class="flex flex-col gap-6">
          <!-- Input: Workspace Name -->
          <div class="flex flex-col gap-2">
            <label
              class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest"
              for="workspaceName"
              >Workspace Name</label
            >
            <input
              class="w-full bg-surface-bright border border-outline-variant text-on-background font-body-md text-body-md px-4 py-3 rounded-DEFAULT focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-outline"
              id="workspaceName"
              placeholder="e.g. Global Corp Q3 2023"
              type="text"
            />
          </div>
          <!-- Input: Currency -->
          <div class="flex flex-col gap-2">
            <label
              class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest"
              for="currency"
              >Default Entity Currency</label
            >
            <div class="relative">
              <select
                class="w-full appearance-none bg-surface-bright border border-outline-variant text-on-background font-body-md text-body-md px-4 py-3 rounded-DEFAULT focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors cursor-pointer"
                id="currency"
              >
                <option selected="" value="NGN">NGN - Nigerian Naira</option>
                <option value="USD">USD - US Dollar</option>
                <option value="EUR">EUR - Euro</option>
                <option value="GBP">GBP - British Pound</option>
              </select>
              <div
                class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant"
              >
                <span
                  class="material-symbols-outlined text-[20px]"
                  style="font-variation-settings: &quot;FILL&quot; 0"
                  >expand_more</span
                >
              </div>
            </div>
            <p class="font-body-sm text-body-sm text-outline mt-1">
              This currency will be used as the base for reporting and AI anomaly detection.
            </p>
          </div>
          <!-- Divider -->
          <div class="w-full h-px bg-outline-variant my-2"></div>
          <!-- Action Area -->
          <div class="flex flex-col-reverse sm:flex-row items-center justify-between gap-4 mt-2">
            <button
              class="w-full sm:w-auto font-label-caps text-label-caps text-on-surface-variant hover:text-on-background transition-colors flex items-center justify-center gap-2 py-3 px-2"
              type="button"
            >
              Cancel
            </button>
            <button
              class="w-full sm:w-auto bg-primary text-on-primary font-label-caps text-label-caps px-8 py-3 rounded-DEFAULT hover:bg-surface-tint transition-colors flex items-center justify-center gap-2 border border-primary"
              type="button"
            >
              Create Workspace
              <span
                class="material-symbols-outlined text-[18px]"
                style="font-variation-settings: &quot;FILL&quot; 0"
                >arrow_forward</span
              >
            </button>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
