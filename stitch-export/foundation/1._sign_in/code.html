<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign In - Accounting AI Agent</title>
    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Newsreader:opsz,wght@6..72,500;6..72,600;6..72,800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface-variant": "#4c4546",
              "secondary-container": "#c3e0ff",
              "gilded-accent": "#8E734B",
              "primary-fixed": "#e2e2e2",
              "surface-container-lowest": "#ffffff",
              "on-surface": "#1c1b1b",
              "on-background": "#1b1b1b",
              "tertiary-container": "#1b1b1b",
              "on-primary-fixed": "#1b1b1b",
              "surface-bright": "#f9f9f9",
              "ai-highlight": "#FFFBEB",
              "tertiary-fixed-dim": "#c6c6c6",
              "status-neutral": "#6B6B6B",
              error: "#ba1a1a",
              "on-tertiary-fixed-variant": "#474747",
              "secondary-fixed": "#cde5ff",
              "status-success": "#1B4332",
              "on-primary-fixed-variant": "#474747",
              outline: "#76777b",
              "surface-dim": "#dadada",
              "surface-container-low": "#f7f3f2",
              "paper-surface": "#FCFCFA",
              "inverse-primary": "#c6c6c6",
              "surface-container-high": "#e8e8e8",
              tertiary: "#000000",
              primary: "#000000",
              "tertiary-fixed": "#e2e2e2",
              "status-error": "#7B2D26",
              "on-secondary": "#ffffff",
              "inverse-on-surface": "#f1f1f1",
              "on-secondary-container": "#48647e",
              surface: "#f9f9f9",
              "on-tertiary": "#ffffff",
              "error-container": "#ffdad6",
              "inverse-surface": "#303030",
              secondary: "#45617b",
              "on-error": "#ffffff",
              "on-primary": "#ffffff",
              "on-secondary-fixed": "#001d32",
              "outline-variant": "#cfc4c5",
              "on-primary-container": "#848484",
              "surface-tint": "#5e5e5e",
              "secondary-fixed-dim": "#adcae8",
              "surface-variant": "#e2e2e2",
              "surface-container-highest": "#e2e2e2",
              "surface-container": "#f1edec",
              "on-secondary-fixed-variant": "#2d4962",
              "on-tertiary-container": "#848484",
              background: "#fdf8f8",
              "primary-container": "#1b1b1b",
              "on-tertiary-fixed": "#1b1b1b",
              "primary-fixed-dim": "#c6c6c6",
              "on-error-container": "#93000a",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              xs: "4px",
              xl: "40px",
              unit: "4px",
              sm: "8px",
              margin: "24px",
              gutter: "16px",
              md: "16px",
              lg: "24px",
            },
            fontFamily: {
              "body-lg": ["Inter"],
              "body-md": ["Inter"],
              "label-caps": ["Inter"],
              "body-sm": ["Inter"],
              "headline-xl": ["Newsreader"],
              "headline-lg": ["Newsreader"],
              "headline-md": ["Newsreader"],
              "data-mono": ["Inter"],
            },
            fontSize: {
              "body-lg": ["1rem", { lineHeight: "1.5", fontWeight: "400" }],
              "body-md": ["0.875rem", { lineHeight: "1.5", fontWeight: "400" }],
              "label-caps": ["0.6875rem", { letterSpacing: "0.05em", fontWeight: "600" }],
              "body-sm": ["0.75rem", { lineHeight: "1.4", fontWeight: "400" }],
              "headline-xl": ["2.5rem", { lineHeight: "1.2", fontWeight: "600" }],
              "headline-lg": ["1.75rem", { lineHeight: "1.2", fontWeight: "500" }],
              "headline-md": ["1.25rem", { lineHeight: "1.3", fontWeight: "500" }],
              "data-mono": ["0.875rem", { lineHeight: "1.2", fontWeight: "500" }],
            },
          },
        },
      };
    </script>
    <style>
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body
    class="bg-surface-container min-h-screen flex items-center justify-center p-gutter selection:bg-secondary-container selection:text-on-secondary-container"
  >
    <!-- Login Container -->
    <main
      class="w-full max-w-[480px] bg-surface-container-lowest border border-outline-variant flex flex-col relative"
    >
      <!-- Top Structural Ledger Line -->
      <div class="h-unit w-full bg-primary absolute top-0 left-0"></div>
      <div class="p-xl flex flex-col">
        <!-- Brand Mark -->
        <div class="flex items-center gap-sm mb-lg">
          <span
            class="material-symbols-outlined text-primary"
            style="font-variation-settings: &quot;FILL&quot; 1"
            >corporate_fare</span
          >
          <span class="font-headline-md text-headline-md text-primary font-bold tracking-tight"
            >Accounting AI Agent</span
          >
        </div>
        <!-- Headline Area -->
        <div class="mb-xl">
          <h1 class="font-headline-xl text-headline-xl text-primary mb-sm">Welcome to the Close</h1>
          <p class="font-body-md text-body-md text-on-surface-variant max-w-[90%]">
            Provide credentials to access the central ledger workspace and commence period review.
          </p>
        </div>
        <!-- Form -->
        <form class="flex flex-col gap-margin">
          <!-- Email Field -->
          <div class="flex flex-col gap-xs">
            <label class="font-label-caps text-label-caps text-on-surface-variant tracking-wide">
              Email Address
            </label>
            <input
              class="bg-surface-container-lowest border border-outline-variant p-md font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors rounded-none placeholder-on-surface-variant/40"
              placeholder="auditor@globalcorp.com"
              required=""
              type="email"
            />
          </div>
          <!-- Password Field -->
          <div class="flex flex-col gap-xs">
            <div class="flex justify-between items-end">
              <label class="font-label-caps text-label-caps text-on-surface-variant tracking-wide">
                Password
              </label>
              <a
                class="font-label-caps text-label-caps text-secondary hover:text-primary transition-colors focus:outline-none focus:underline"
                href="#"
              >
                Reset Access
              </a>
            </div>
            <input
              class="bg-surface-container-lowest border border-outline-variant p-md font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors rounded-none placeholder-on-surface-variant/40"
              placeholder="••••••••••••"
              required=""
              type="password"
            />
          </div>
          <!-- Action -->
          <button
            class="bg-primary text-on-primary font-body-lg text-body-lg py-md px-lg mt-sm hover:bg-inverse-surface transition-colors flex items-center justify-center gap-sm font-medium focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container-lowest rounded-none"
            type="submit"
          >
            Enter Workspace
            <span class="material-symbols-outlined text-on-primary text-[20px]">arrow_forward</span>
          </button>
        </form>
      </div>
      <!-- Footer / Trust Indicators -->
      <div
        class="border-t border-outline-variant bg-surface-bright py-md px-xl flex items-center justify-between"
      >
        <div class="flex items-center gap-sm">
          <span class="material-symbols-outlined text-status-neutral text-[18px]">gpp_good</span>
          <span class="font-body-sm text-body-sm text-on-surface-variant">SSO Enforced</span>
        </div>
        <div class="flex items-center gap-sm">
          <span class="material-symbols-outlined text-status-neutral text-[18px]">history_edu</span>
          <span class="font-body-sm text-body-sm text-on-surface-variant"
            >Audit Logging Active</span
          >
        </div>
      </div>
    </main>
  </body>
</html>
